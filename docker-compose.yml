version: '3'

services:
  web:
    container_name: finex-web
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - 13227:13227
    environment:
      - NODE_ENV=production
      - PORT=13227
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-http://localhost:8000}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_TOSS_CLIENT_KEY=${NEXT_PUBLIC_TOSS_CLIENT_KEY}
    # If you need to access other services on the host machine, you can use:
    extra_hosts:
      - "host.docker.internal:host-gateway"
